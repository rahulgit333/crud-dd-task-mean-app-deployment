version: "3.9"

services:

  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  backend:
    image: rahuldanodia/mean-backend:latest
    build: ./backend
    container_name: backend
    restart: always
    depends_on:
      - mongo

  frontend:
    image: rahuldanodia/mean-frontend:latest
    build: ./frontend
    container_name: frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  mongo-data:
